syntax = "proto3";

package tast.core;
option go_package = "chromiumos/tast/rpc";

message BundleParamsReq {
  map<string, string> vars = 1;
}

message BundleParamsRsp {
  bool   success = 1;
  string errorMessage = 2;
}
