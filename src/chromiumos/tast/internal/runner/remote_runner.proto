syntax = "proto3";

package tast.runner;
option go_package = "chromiumos/tast/internal/runner";

service RemoteRunnerService {
  rpc RunTests(RunTestsRequest) returns (stream RunTestsResponse) {}
}

message RunTestsRequest {
  string payload = 1;
}

message RunTestsResponse {
  string payload = 1;
}
