syntax = "proto3";

package tast.core;
option go_package = "chromiumos/tast/internal/runner";

service TastCoreService {
  rpc Delegate(DelegateRequest) returns (stream DelegateResponse) {}
}

message DelegateRequest {
  string payload = 1;
}

message DelegateResponse {
  string payload = 1;
}
