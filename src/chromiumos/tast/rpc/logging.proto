syntax = "proto3";

package tast.core;
option go_package = "chromiumos/tast/rpc";

service Logging {
  rpc ReadLogs(stream ReadLogsRequest) returns (stream ReadLogsReply) {}
}

message ReadLogsRequest {
}

message ReadLogsReply {
  LogEntry entry = 1;
}

message LogEntry {
  string msg = 1;
}
